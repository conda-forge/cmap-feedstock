{% set name = "cmap" %}
{% set version = "0.7.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/cmap-{{ version }}.tar.gz
  sha256: 9501cec4d5c2b7a821479aec3282b3d8b42fda983bad055e0f9dbc19cf7bc5b1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >={{ python_min }}
    - numpy

test:
  imports:
    - cmap
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/tlambert03/cmap
  summary: Scientific colormaps for python, with only numpy dependency
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSES/
  doc_url: https://cmap-docs.rtfd.io
  dev_url: https://github.com/tlambert03/cmap

extra:
  recipe-maintainers:
    - tlambert03
